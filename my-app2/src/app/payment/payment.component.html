<div class="payment-container">
  <div class="payment-card">
    <div class="payment-header">
      <img src="https://cdn.haitrieu.com/wp-content/uploads/2022/10/Logo-MoMo-Square.png" alt="MoMo Logo" class="momo-logo">
      <h2>Thanh toán qua MoMo</h2>
    </div>

    <div class="payment-body">
      <div class="order-summary">
        <h3>Thông tin đơn hàng</h3>
        <p><strong>Sản phẩm:</strong> Gói Premium Subscription</p>
        <p><strong>Mã đơn hàng:</strong> #MOMO{{amount}}</p>
        <div class="price-row">
          <span>Tổng thành tiền:</span>
          <span class="price-amount">{{ amount | number:'1.0-0' }} VNĐ</span>
        </div>
      </div>

      <div *ngIf="errorMsg" class="error-alert">
        {{ errorMsg }}
      </div>

      <button class="momo-btn" (click)="payWithMoMo()" [disabled]="loading">
        <span *ngIf="!loading">Thanh toán bằng MoMo</span>
        <span *ngIf="loading" class="spinner">Đang xử lý...</span>
      </button>
    </div>
  </div>
</div>
